<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Letter for ZIANNE</title>
  <link rel="stylesheet" href="Zi.css">

  <!-- ✅ Add jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <!-- Envelope -->
  <div class="envlope-wrapper">
    <div id="envelope" class="close">

      <div class="front flap"></div>
      <div class="front pocket"></div>

      <div class="letter">
        <div class="words line1">To: ZIANNE 💖</div>
        <div class="words line2">I MISS YOU!</div>
        <div class="words line3">and</div>
        <div class="words line4">I LOVE YOU 3000 ❤️</div>
      </div>

      <div class="hearts">
        <div class="heart a1"></div>
        <div class="heart a2"></div>
        <div class="heart a3"></div>
      </div>

    </div>
  </div>

  <!-- Buttons -->
  <div class="reset">
    <button id="open">Open</button>
    <button id="reset">Reset</button>
  </div>

  <script src="Zi.js"></script>
</body>
</html>
